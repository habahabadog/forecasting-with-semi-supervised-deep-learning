experiment:
  name: fusioncast_ems_2022_15min
  source_version: /tf/yjzx/new/files/20250620
  status: manuscript_reproducibility_package

data:
  dataset: art1km
  year: 2022
  variables:
    - t2m
    - u10
    - v10
    - precipitation
  target_resolution_km: 1
  coarse_resolution_km: 5
  tensor_shape_daily_npz: [4, 24, 1031, 1321]
  target_grid_after_crop: [4, 1030, 1320]
  train_validation_cutoff: "20221000"
  train_fraction_before_cutoff: 0.8
  test_period: "2022-10 through 2022-12"
  full_archive_access: restricted_by_data_provider

normalization:
  mean: [295.71266308, -1.35061465, -0.47545855, 24.42778042]
  std: [4.25024591, 2.50847865, 2.44562078, 67.33232656]

model:
  temporal_module:
    in_channels: 8
    out_channels: 44
    residual_groups: 2
    residual_blocks: 2
    features: 32
    scale: 1
  spatial_module:
    in_channels: 4
    out_channels: 4
    residual_groups: 2
    residual_blocks: 2
    features: 96
    scale: 5

training:
  optimizer: Adam
  learning_rate: 0.0001
  loss: MAE
  max_epochs: 100
  batch_size_in_snapshot_code: 4
  reported_manuscript_batch_size: 16
  hardware_reported: NVIDIA A800 80GB
